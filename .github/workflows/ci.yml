name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-risk-gate:
    name: pr-risk-gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: python scripts/check_pr_risk.py --event-path "$GITHUB_EVENT_PATH"

  api-tests:
    name: api-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/api/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest tests/
      - name: Test delivery tooling
        working-directory: .
        run: python -m unittest discover -s scripts/tests

  web-checks:
    name: web-checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Verify public lockfile registry
        run: |
          non_public=$(jq -r '.. | objects | .resolved? // empty' package-lock.json | grep -Ev '^https://registry\.npmjs\.org/' || true)
          test -z "$non_public"
      - run: npm ci --no-audit --no-fund --ignore-scripts --registry=https://registry.npmjs.org
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_DEV_MOCK_AUTH: "false"
