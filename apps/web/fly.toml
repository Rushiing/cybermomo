# Fly.io Web service · cybermomo-web (Next.js 14 standalone)
#
# 用法(cd apps/web):
#   flyctl deploy
#
# 第一次部署前:
#   1. cd apps/web && flyctl launch --no-deploy --copy-config --region hkg --name cybermomo-web
#      (launch 会问要不要 PG / Redis,全选 No)
#   2. flyctl secrets set --app cybermomo-web NEXTAUTH_SECRET=...
#      (虽然项目目前没用 next-auth,但 .env.example 列了,先留个)
#
# 关键:NEXT_PUBLIC_API_URL 必须在 build 时就有(Next.js 会 bake 进 client bundle)。
# Dockerfile 里走 ARG → ENV 的链路。Fly 部署时通过 --build-arg 注入:
#   flyctl deploy --build-arg NEXT_PUBLIC_API_URL=https://cybermomo-api.fly.dev \
#                 --build-arg NEXT_PUBLIC_DEV_MOCK_AUTH=false

app = "cybermomo-web"
primary_region = "hkg"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[http_service.concurrency]
  type = "requests"
  soft_limit = 200
  hard_limit = 300

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "20s"
  method = "GET"
  path = "/"

[[vm]]
  # Next.js standalone 不吃内存,512MB 够
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[processes]
  app = ""
