# CyberMOMO Alembic 配置
#
# 用法(在 apps/api/ 目录下):
#   alembic revision --autogenerate -m "describe change"
#   alembic upgrade head
#   alembic downgrade -1
#   alembic history
#
# DATABASE_URL 从环境变量读(见 alembic/env.py),不写死在这里。

[alembic]
script_location = alembic
prepend_sys_path = .
timezone = UTC
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s
truncate_slug_length = 40
version_path_separator = os
output_encoding = utf-8

# sqlalchemy.url 留空 — 由 env.py 从 DATABASE_URL 注入

[post_write_hooks]
# 暂不启用自动格式化

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
